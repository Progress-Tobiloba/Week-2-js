<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress | Secure Authentication Console</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #111827;
            --accent-color: #10b981;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 90%; max-width: 420px;
            background: var(--card-bg);
            padding: 2rem; border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            border: 1px solid #1f2937;
            text-align: center;
        }
        h2 { margin-bottom: 1.5rem; font-size: 1.75rem; color: var(--text-main); }
        h2 span { color: var(--accent-color); }
        .form-group { text-align: left; margin-bottom: 1.25rem; }
        label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.85rem; }
        input {
            width: 100%; padding: 0.75rem; background: #1f2937;
            border: 1px solid #374151; border-radius: 6px;
            color: var(--text-main); font-size: 1rem; box-sizing: border-box;
        }
        input:focus { outline: none; border-color: var(--accent-color); }
        .btn-group { display: flex; gap: 10px; margin-top: 1.5rem; }
        button {
            flex: 1; padding: 0.75rem; border: none; border-radius: 6px;
            font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .btn-primary { background: var(--accent-color); color: #0b0f19; }
        .btn-secondary { background: #374151; color: var(--text-main); }
        button:hover { opacity: 0.9; }
        #status {
            margin-top: 1.5rem; padding: 0.75rem; border-radius: 6px;
            display: none; font-size: 0.9rem; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Secure <span>Gatekeeper</span></h2>
    <p style="color: var(--text-muted); font-size: 0.85rem; margin-top: -1rem; margin-bottom: 1.5rem;">Bcrypt Cryptographic Authentication System</p>
    
    <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter username">
    </div>
    <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter secure password">
    </div>

    <div class="btn-group">
        <button class="btn-secondary" onclick="handleAuth('/api/register')">Register</button>
        <button class="btn-primary" onclick="handleAuth('/api/login')">Log In</button>
    </div>

    <div id="status"></div>
</div>

<script>
    async function handleAuth(endpoint) {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const statusBox = document.getElementById('status');

        if (!username || !password) {
            statusBox.style.display = 'block';
            statusBox.style.background = 'rgba(239, 68, 68, 0.1)';
            statusBox.style.color = '#ef4444';
            statusBox.innerText = 'Fields cannot be blank!';
            return;
        }

        try {
            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const text = await response.text();

            statusBox.style.display = 'block';
            if (response.ok) {
                statusBox.style.background = 'rgba(16, 185, 129, 0.1)';
                statusBox.style.color = '#10b981';
                statusBox.innerText = text;
            } else {
                statusBox.style.background = 'rgba(239, 68, 68, 0.1)';
                statusBox.style.color = '#ef4444';
                statusBox.innerText = text;
            }
        } catch (err) {
            statusBox.style.display = 'block';
            statusBox.style.color = '#ef4444';
            statusBox.innerText = 'Cannot connect to server.';
        }
    }
</script>

</body>
</html>
