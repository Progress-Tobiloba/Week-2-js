<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress | Encryption Gateway</title>
    <style>
        body {
            background-color: #0b0f19; font-family: 'Segoe UI', sans-serif;
            color: #f9fafb; display: flex; justify-content: center;
            align-items: center; min-height: 100vh; margin: 0;
        }
        .login-card {
            background: #111827; padding: 2.5rem; border-radius: 12px;
            border: 1px solid #1f2937; width: 90%; max-width: 380px; text-align: center;
        }
        h2 { margin-bottom: 1.5rem; font-size: 1.5rem; color: #10b981; }
        input {
            width: 100%; padding: 0.75rem; background: #1f2937; border: 1px solid #374151;
            border-radius: 6px; color: #white; margin-bottom: 1.25rem; box-sizing: border-box;
        }
        input:focus { outline: none; border-color: #10b981; }
        button {
            width: 100%; padding: 0.8rem; background: #10b981; color: #0b0f19;
            border: none; border-radius: 6px; font-weight: bold; cursor: pointer;
        }
        #error-msg { color: #ef4444; margin-top: 1rem; font-size: 0.9rem; display: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Identity Verification</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Passcode">
        <button onclick="attemptLogin()">Decrypt Vault</button>
        <div id="error-msg"></div>
    </div>

    <script>
        async function attemptLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-msg');

            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            if (res.ok) {
                window.location.href = '/';
            } else {
                errorDiv.style.display = 'block';
                errorDiv.innerText = 'Access Denied: Invalid Signature.';
            }
        }
    </script>
</body>
</html>
